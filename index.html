<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan-Lin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #1e1e1e;
    --sidebar-bg:    #252526;
    --sidebar-w:     260px;
    --border:        #3c3c3c;
    --text:          #d4d4d4;
    --text-dim:      #888;
    --accent:        #4ec9b0;
    --link:          #9cdcfe;
    --nav-hover:     #2a2d2e;
    --nav-active-bg: #094771;
    --card-bg:       #2d2d2d;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .site-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
  }

  .site-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    background: #3c3c3c;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }

  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--accent); }

  nav { padding: 12px 0; flex: 1; }

  .nav-label {
    padding: 10px 16px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .nav-item {
    display: block;
    padding: 6px 16px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
  }

  .nav-item:hover { background: var(--nav-hover); }

  .nav-item.active {
    background: var(--nav-active-bg);
    color: #fff;
  }

  .nav-children .nav-item {
    padding-left: 28px;
    font-size: 13px;
    color: #bbb;
    border-left: 2px solid var(--border);
    margin-left: 16px;
  }

  .nav-children .nav-item:hover {
    border-left-color: var(--accent);
    color: var(--text);
    background: var(--nav-hover);
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }

  .sidebar-footer a { color: var(--text-dim); text-decoration: none; }
  .sidebar-footer a:hover { color: var(--accent); }

  /* ── Main ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 44px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 36px;
    font-size: 13px;
    color: var(--text-dim);
    gap: 6px;
  }

  .topbar a { color: var(--link); text-decoration: none; }

  .content {
    max-width: 820px;
    padding: 48px 36px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin: 36px 0 12px;
  }

  p { color: var(--text-dim); margin-bottom: 20px; }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .12s, background .12s;
    cursor: pointer;
  }

  .card:hover {
    border-color: var(--accent);
    background: #333;
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 5px;
  }

  .card-tag {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Consolas', monospace;
  }
</style>
</head>

      </a>
      <a href="#" class="card">
