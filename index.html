<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan-Lin</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #1e1e1e;
    --sidebar-bg:    #252526;
    --sidebar-w:     260px;
    --border:        #3c3c3c;
    --text:          #d4d4d4;
    --text-dim:      #888;
    --accent:        #4ec9b0;
    --link:          #9cdcfe;
    --nav-hover:     #2a2d2e;
    --nav-active-bg: #094771;
    --card-bg:       #2d2d2d;
    --code-bg:       #2d2d2d;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .site-title {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    text-decoration: none;
    cursor: pointer;
  }

  .site-desc {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .search-wrap input {
    width: 100%;
    background: #3c3c3c;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
  }
  .search-wrap input::placeholder { color: var(--text-dim); }
  .search-wrap input:focus { border-color: var(--accent); }

  nav { padding: 12px 0; flex: 1; }

  .nav-label {
    padding: 10px 16px 4px;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .nav-item {
    display: block;
    padding: 6px 16px;
    color: var(--text);
    text-decoration: none;
    font-size: 14px;
    cursor: pointer;
  }
  .nav-item:hover { background: var(--nav-hover); }
  .nav-item.active { background: var(--nav-active-bg); color: #fff; }

  .nav-children .nav-item {
    padding-left: 28px;
    font-size: 13px;
    color: #bbb;
    border-left: 2px solid var(--border);
    margin-left: 16px;
  }
  .nav-children .nav-item:hover {
    border-left-color: var(--accent);
    color: var(--text);
    background: var(--nav-hover);
  }
  .nav-children .nav-item.active {
    border-left-color: var(--accent);
    background: var(--nav-active-bg);
    color: #fff;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
  }
  .sidebar-footer a { color: var(--text-dim); text-decoration: none; }
  .sidebar-footer a:hover { color: var(--accent); }

  /* ── Main ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    height: 44px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 36px;
    font-size: 13px;
    color: var(--text-dim);
    gap: 6px;
  }
  .topbar a { color: var(--link); text-decoration: none; cursor: pointer; }
  .topbar span { color: var(--text-dim); }

  .content { max-width: 820px; padding: 48px 36px; }

  /* ── Homepage ── */
  .home-title {
    font-size: 26px;
    font-weight: 600;
    color: #fff;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .home-desc { color: var(--text-dim); margin-bottom: 8px; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin: 32px 0 10px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .card:hover { border-color: var(--accent); background: #333; }
  .card-name { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 5px; }
  .card-tag  { font-size: 11px; color: var(--text-dim); font-family: 'Consolas', monospace; }

  /* ── Markdown ── */
  .md-body h1 {
    font-size: 24px; font-weight: 600; color: #fff;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .md-body h2 {
    font-size: 18px; font-weight: 600; color: var(--accent);
    margin: 28px 0 10px;
  }
  .md-body h3 {
    font-size: 15px; font-weight: 600; color: #ccc;
    margin: 20px 0 8px;
  }
  .md-body p  { margin-bottom: 14px; }
  .md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 14px; }
  .md-body li { margin-bottom: 4px; }
  .md-body a  { color: var(--link); }
  .md-body a:hover { text-decoration: underline; }
  .md-body code {
    background: var(--code-bg); padding: 2px 6px;
    border-radius: 3px; font-family: 'Consolas', monospace;
    font-size: 13px; color: #ce9178;
  }
  .md-body pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px; margin-bottom: 16px;
    overflow-x: auto;
  }
  .md-body pre code {
    background: none; padding: 0; color: #d4d4d4; font-size: 13px;
  }
  .md-body blockquote {
    border-left: 3px solid var(--accent); padding-left: 16px;
    color: var(--text-dim); margin-bottom: 14px;
  }
  .md-body table {
    border-collapse: collapse; width: 100%; margin-bottom: 16px; font-size: 14px;
  }
  .md-body th, .md-body td {
    border: 1px solid var(--border); padding: 8px 12px; text-align: left;
  }
  .md-body th { background: #2a2a2a; color: #fff; }
  .md-body hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="site-title" onclick="showHome()">Fan-Lin</div>
    <div class="site-desc">个人教程与学习笔记</div>
  </div>

  <div class="search-wrap">
    <input type="text" placeholder="搜索…" oninput="filterNav(this.value)">
  </div>

  <nav>
    <div class="nav-item active" id="nav-home" onclick="showHome()">首页</div>

    <div class="nav-label">教程</div>
    <div class="nav-children">
      <div class="nav-item" data-file="tutorials/Gitbrief.md"       data-title="Git 简略版"      onclick="loadTutorial(this)">Git 简略版</div>
      <div class="nav-item" data-file="tutorials/Git菜鸟教程.md"    data-title="Git 菜鸟教程"    onclick="loadTutorial(this)">Git 菜鸟教程</div>
      <div class="nav-item" data-file="tutorials/PR提交问题合集.md" data-title="PR 提交问题合集" onclick="loadTutorial(this)">PR 提交问题合集</div>
      <div class="nav-item" data-file="tutorials/LaTeX语法学习.md"  data-title="LaTeX 语法学习"  onclick="loadTutorial(this)">LaTeX 语法学习</div>
      <div class="nav-item" data-file="tutorials/CS50课后作业.md"   data-title="CS50 课后作业"   onclick="loadTutorial(this)">CS50 课后作业</div>
      <div class="nav-item" data-file="tutorials/安装Visio.md"      data-title="安装 Visio"      onclick="loadTutorial(this)">安装 Visio</div>
      <div class="nav-item" data-file="tutorials/vlookup.md"        data-title="Vlookup"         onclick="loadTutorial(this)">Vlookup</div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <a href="https://github.com/Fan-Lin" target="_blank">GitHub ↗</a>
  </div>
</aside>

<div class="main">
  <div class="topbar" id="topbar">
    <a onclick="showHome()">首页</a>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
var HOME_HTML = '\
  <div class="home-title">欢迎来到 Fan-Lin 的学习空间</div>\
  <p class="home-desc">这里收录了我学习过程中整理的笔记与教程，使用左侧导航栏浏览内容。</p>\
  <div class="section-label">Git / 版本控制</div>\
  <div class="cards">\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/Gitbrief.md\',\'Git 简略版\')">\
      <div class="card-name">Git 简略版</div><div class="card-tag">git</div></div>\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/Git菜鸟教程.md\',\'Git 菜鸟教程\')">\
      <div class="card-name">Git 菜鸟教程</div><div class="card-tag">git</div></div>\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/PR提交问题合集.md\',\'PR 提交问题合集\')">\
      <div class="card-name">PR 提交问题合集</div><div class="card-tag">git</div></div>\
  </div>\
  <div class="section-label">工具 / 办公</div>\
  <div class="cards">\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/LaTeX语法学习.md\',\'LaTeX 语法学习\')">\
      <div class="card-name">LaTeX 语法学习</div><div class="card-tag">latex</div></div>\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/安装Visio.md\',\'安装 Visio\')">\
      <div class="card-name">安装 Visio</div><div class="card-tag">visio</div></div>\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/vlookup.md\',\'Vlookup\')">\
      <div class="card-name">Vlookup</div><div class="card-tag">excel</div></div>\
  </div>\
  <div class="section-label">编程</div>\
  <div class="cards">\
    <div class="card" onclick="loadTutorialByFile(\'tutorials/CS50课后作业.md\',\'CS50 课后作业\')">\
      <div class="card-name">CS50 课后作业</div><div class="card-tag">python · c</div></div>\
  </div>';

function setActiveNav(file) {
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  if (!file) { document.getElementById('nav-home').classList.add('active'); return; }
  document.querySelectorAll('.nav-item[data-file]').forEach(function(el) {
    if (el.dataset.file === file) el.classList.add('active');
  });
}

function setTopbar(title) {
  var tb = document.getElementById('topbar');
  tb.innerHTML = title
    ? '<a onclick="showHome()">首页</a><span>›</span><span>' + title + '</span>'
    : '<a onclick="showHome()">首页</a>';
}

function showHome() {
  document.getElementById('content').innerHTML = HOME_HTML;
  setActiveNav(null);
  setTopbar(null);
}

function loadTutorial(el) {
  loadTutorialByFile(el.dataset.file, el.dataset.title);
}

function loadTutorialByFile(file, title) {
  setActiveNav(file);
  setTopbar(title);
  document.getElementById('content').innerHTML = '<p style="color:var(--text-dim);padding:20px 0">加载中…</p>';
  fetch(file)
    .then(function(r) { if (!r.ok) throw new Error('404'); return r.text(); })
    .then(function(md) {
      md = md.replace(/^---[\s\S]*?---\n*/, '');
      md = md.replace(/<\/?center>/g, '');
      var div = document.createElement('div');
      div.className = 'md-body';
      div.innerHTML = marked.parse(md);
      var c = document.getElementById('content');
      c.innerHTML = '';
      c.appendChild(div);
    })
    .catch(function() {
      document.getElementById('content').innerHTML =
        '<p style="color:var(--text-dim);padding:20px 0">本地预览不支持 fetch，上线后可正常访问。</p>';
    });
}

function filterNav(q) {
  q = q.trim().toLowerCase();
  document.querySelectorAll('.nav-item[data-file]').forEach(function(el) {
    el.style.display = (!q || el.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

showHome();
</script>
</body>
</html>
